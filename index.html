<script>
var WM=[],SF=null,DB_NAME="leapDB",STORE="words",db=null;
var app=document.getElementById("app");
var DAY=86400000;

function $(id){return document.getElementById(id);}
function now(){return Date.now?Date.now():(new Date()).getTime();}
function esc(s){
  return String(s||"").replace(/[&<>"']/g,function(c){
    return {
      "&":"&amp;",
      "<":"&lt;",
      ">":"&gt;",
      '"':"&quot;",
      "'":"&#39;"
    }[c];
  });
}
function js(s){return String(s||"").replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/[\r\n]/g," ");}

function initDB(cb){
  if(!window.indexedDB){cb();return;}
  try{
    var req=indexedDB.open(DB_NAME,1);
    req.onupgradeneeded=function(e){
      var d=e.target.result;
      if(!d.objectStoreNames.contains(STORE)){
        d.createObjectStore(STORE,{keyPath:"id"});
      }
    };
    req.onsuccess=function(e){db=e.target.result;cb();};
    req.onerror=function(){db=null;cb();};
  }catch(e){db=null;cb();}
}

function saveDB(words,cb){
  if(!db){
    try{localStorage.setItem("wordsBackup",JSON.stringify(words));}catch(e){}
    if(cb)cb();
    return;
  }
  try{
    var tx=db.transaction(STORE,"readwrite");
    var s=tx.objectStore(STORE);
    s.clear();
    for(var i=0;i<words.length;i++){s.put(words[i]);}
    tx.oncomplete=function(){if(cb)cb();};
    tx.onerror=function(){if(cb)cb();};
  }catch(e){if(cb)cb();}
}

function loadDB(cb){
  if(!db){
    try{cb(JSON.parse(localStorage.getItem("wordsBackup")||"[]"));}catch(e){cb([]);}
    return;
  }
  try{
    var tx=db.transaction(STORE,"readonly");
    var r=tx.objectStore(STORE).getAll();
    r.onsuccess=function(){cb(r.result||[]);};
    r.onerror=function(){cb([]);};
  }catch(e){cb([]);}
}

function lp(){try{return JSON.parse(localStorage.getItem("lp7")||"{}");}catch(e){return{};}}
function sp(p){try{localStorage.setItem("lp7",JSON.stringify(p));}catch(e){}}
function lsk(){return{c:parseInt(localStorage.getItem("ls7")||"0",10),d:localStorage.getItem("ld7")||""};}
function getTodayStudy(){
  var d=(new Date()).toDateString();

  if(localStorage.getItem("studyDay")!==d){
    localStorage.setItem("studyDay",d);
    localStorage.setItem("studyCount","0");
    return 0;
  }

  return parseInt(localStorage.getItem("studyCount")||"0",10);
}

function addTodayStudy(){
  var d=(new Date()).toDateString();

  if(localStorage.getItem("studyDay")!==d){
    localStorage.setItem("studyDay",d);
    localStorage.setItem("studyCount","0");
  }

  var n=parseInt(localStorage.getItem("studyCount")||"0",10)+1;
  localStorage.setItem("studyCount",n);
var total=parseInt(localStorage.getItem("studyTotal")||"0",10)+1;
localStorage.setItem("studyTotal",total);
}
function ssk(s){localStorage.setItem("ls7",s.c);localStorage.setItem("ld7",s.d);}
function due(nr){return !nr||now()>=nr;}
function gst(lv,wr,nr){if(lv===0)return 0;if(lv>=5)return 3;if(due(nr))return 2;return 1;}
function saveP(w){
  var p=lp();
  p[w.id]={level:w.level,correct:w.correct,wrong:w.wrong,nextReview:w.nextReview,interval:w.interval};
  sp(p);
}
function getTotalStudy(){
  return parseInt(localStorage.getItem("studyTotal")||"0",10);
}
function toggleStudyView(){
  S.studyView = S.studyView==="total" ? "today" : "total";
  render();
}
function parseCSV(txt){
  var lines = txt.split(/\r?\n/);
  var out = [];

  for(var i=0;i<lines.length;i++){
    var line = lines[i];
    if(!line || !line.replace(/\s/g,"")) continue;

    var cols = [], cur = "", inq = false;

    for(var j=0;j<line.length;j++){
      var c = line.charAt(j);

      if(c === '"' && line.charAt(j+1) === '"'){
        cur += '"';
        j++;
      }
      else if(c === '"'){
        inq = !inq;
      }
      else if(c === "," && !inq){
        cols.push(cur.replace(/^\s+|\s+$/g,""));
        cur = "";
      }
      else{
        cur += c;
      }
    }
    cols.push(cur.replace(/^\s+|\s+$/g,""));

    var word = (cols[1]||"").trim();
    var meaning = (cols[2]||"").trim();

    if(!word || !meaning || word==="英単語" || word.toLowerCase()==="word") continue;

    var meanings = [];
    var ms = meaning.split(/[\/／]/);

    for(var k=0;k<ms.length;k++){
      var m = ms[k].replace(/^\s+|\s+$/g,"");
      if(m) meanings.push(m);
    }

    if(!meanings.length) meanings = [meaning];

out.push({
      id: parseInt(cols[0],10) || (out.length+1),
      num: String(cols[0] || out.length+1),
      word: word,
      meanings: meanings,
      example: (cols[3]||"").trim(),
      part: (cols[4]||"").trim()
    });
  }

  return out;
}

function cat(w){
  var n=parseInt(w.num,10)||w.id;
  if(n>=1 && n<=1000)return "active";
  return "passive";
}

function bookPart(w){
  var n=parseInt(w.num,10)||w.id;
  if(n>=1 && n<=400)return "Active Part1";
  if(n>=401 && n<=1000)return "Active Part2";
  if(n>=1001 && n<=1400)return "Passive Part1";
  if(n>=1401 && n<=2000)return "Passive Part2";
  return "";
}
function getRecommendedMode(){
  return 3; // シンプル：全単語
}

function getRecommendedLabel(){
  return 'おすすめ問題';
}
function parts(){
  var m={},a=[];
  for(var i=0;i<WM.length;i++){
    var p=WM[i].part||"";
    if(p&&!m[p]){m[p]=1;a.push(p);}
  }
  return a;
}

function rangeBy(fn){
  var mn=null,mx=null;
  for(var i=0;i<WM.length;i++){
    if(fn(WM[i])){
      var n=parseInt(WM[i].num,10)||WM[i].id;
      if(mn===null||n<mn)mn=n;
      if(mx===null||n>mx)mx=n;
    }
  }
  return{from:mn||1,to:mx||WM.length||1};
}

function autoRange(){
  if(S.partFilter!=="all")return rangeBy(function(w){return w.part===S.partFilter;});
  if(S.theme==="active")return rangeBy(function(w){return cat(w)==="active";});
  if(S.theme==="passive")return rangeBy(function(w){return cat(w)==="passive";});
  return{from:1,to:WM.length||1};
}

function applyAutoRange(){
  var r=autoRange();
  S.rFrom=r.from;
  S.rTo=r.to;
}

function pass(w){
  var n=parseInt(w.num,10)||w.id;
  if(n<S.rFrom||n>S.rTo)return false;
  return true;
}

function sh(a){
  for(var i=a.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1)),t=a[i];
    a[i]=a[j];a[j]=t;
  }
  return a;
}

function cloneWord(w){
  var o={};
  for(var k in w){if(w.hasOwnProperty(k))o[k]=w[k];}
  return o;
}

function mergeInto(a,b){
  for(var k in b){if(b.hasOwnProperty(k))a[k]=b[k];}
  return a;
}
function getAnswerTextByType(w,opt){
  if(!opt)return "";

  if(w.qtype==="ew4"){
    return opt.meanings && opt.meanings[0] ? opt.meanings[0] : "";
  }

  if(w.qtype==="je4"){
    return opt.word || "";
  }

  if(w.qtype==="ex4"){
    return opt.word || "";
  }

  return opt.word || "";
}

function loadAnswerLogs(){
  try{
    return JSON.parse(localStorage.getItem("answerLogs")||"[]");
  }catch(e){
    return [];
  }
}

function saveAnswerLog(log){
  var logs = loadAnswerLogs();

  logs.push(log);

  // 保存量が増えすぎないように、直近1000件だけ残す
  if(logs.length>1000){
    logs = logs.slice(logs.length-1000);
  }

  try{
    localStorage.setItem("answerLogs",JSON.stringify(logs));
  }catch(e){}
}
function analyzeAnswerLogs(){
  var logs = loadAnswerLogs();
  var byWord = {};
  var result = {
    remiss: [],
    streakWrong: [],
    sameWrong: []
  };

  for(var i=0;i<logs.length;i++){
    var log = logs[i];
    if(!log || !log.wordId)continue;

    if(!byWord[log.wordId])byWord[log.wordId]=[];
    byWord[log.wordId].push(log);
  }

  for(var id in byWord){
    if(!byWord.hasOwnProperty(id))continue;

    var arr = byWord[id];

    arr.sort(function(a,b){
      return (a.timestamp||0) - (b.timestamp||0);
    });

    var last = arr[arr.length-1];
    var prev = arr.length>=2 ? arr[arr.length-2] : null;

    // 再ミス：過去に正解があり、直近が不正解
    var lastCorrectBefore = null;
    if(last && !last.isCorrect){
      for(var j=arr.length-2;j>=0;j--){
        if(arr[j].isCorrect){
          lastCorrectBefore = arr[j];
          break;
        }
      }

      if(lastCorrectBefore){
        result.remiss.push({
          wordId:last.wordId,
          wordNum:last.wordNum,
          word:last.word,
          correctAnswer:last.correctAnswer,
          selectedAnswer:last.selectedAnswer,
          previousCorrectAnswer:lastCorrectBefore.correctAnswer,
          message:"前は正解 → 今回ミス",
          timestamp:last.timestamp
        });
      }
    }

    // 連続ミス：直近2回がどちらも不正解
    if(prev && last && !prev.isCorrect && !last.isCorrect){
      result.streakWrong.push({
        wordId:last.wordId,
        wordNum:last.wordNum,
        word:last.word,
        correctAnswer:last.correctAnswer,
        prevSelectedAnswer:prev.selectedAnswer,
        selectedAnswer:last.selectedAnswer,
        sameChoice:prev.selectedAnswer && last.selectedAnswer && prev.selectedAnswer===last.selectedAnswer,
        message:"2回連続でミス",
        timestamp:last.timestamp
      });

      // 同じ誤答：直近2回の不正解で、同じ選択肢を選んでいる
      if(
        prev.selectedAnswer &&
        last.selectedAnswer &&
        prev.selectedAnswer === last.selectedAnswer
      ){
        result.sameWrong.push({
          wordId:last.wordId,
          wordNum:last.wordNum,
          word:last.word,
          correctAnswer:last.correctAnswer,
          selectedAnswer:last.selectedAnswer,
          message:"同じ答えに引っ張られています",
          timestamp:last.timestamp
        });
      }
    }
  }

  return result;
}
function insightListHTML(title,items,emptyText){
  var h = "";

  h+='<div style="margin-top:10px;padding-top:10px;border-top:1px solid #1e2238;">';
  h+='<div class="ct" style="font-size:.78rem;margin-bottom:6px;">'+title+'</div>';

  if(!items || !items.length){
    h+='<div class="cd">'+emptyText+'</div>';
    h+='</div>';
    return h;
  }

  var max = Math.min(items.length,10);

  for(var i=0;i<max;i++){
    var item = items[i];
    h+='<div style="display:flex;gap:8px;align-items:center;padding:5px 0;font-size:.8rem;">';
    h+='<span style="color:#5a6080;min-width:52px;">No.'+esc(item.wordNum || item.wordId || "")+'</span>';
    h+='<span style="font-weight:800;color:#eef0f8;">'+esc(item.word || "")+'</span>';
    h+='</div>';
  }

  if(items.length>10){
    h+='<div class="cd" style="margin-top:4px;">ほか '+(items.length-10)+'語</div>';
  }

  h+='</div>';
  return h;
}
function calcNext(w,ok){
  var lv=w.level||0,co=w.correct||0,wr=w.wrong||0,iv=w.interval||0,nr=w.nextReview||null;
  if(ok){
    co++;
    lv=Math.min(lv+1,6);
    iv=[0,1,3,7,14,30,60][Math.min(lv,6)];
    nr=now()+iv*DAY;
  }else{
    wr++;
    lv=0;
    iv=0;
    nr=now();
  }
  return{id:w.id,level:lv,correct:co,wrong:wr,nextReview:nr,interval:iv};
}
function hasExampleWord(ex,word){
  if(!ex||!word)return false;

  var en=String(ex).split(/[（(]/)[0].replace(/^\s+|\s+$/g,"");
  var base=String(word||"").toLowerCase();
  var stem=base.replace(/e$/,"");

  var pats=[base,base+"s",base+"es",base+"ed",base+"ing",stem+"ing"];

  if(/[^aeiou]y$/i.test(base)){
    var y=base.slice(0,-1);
    pats.push(y+"ies");
    pats.push(y+"ied");
  }

  for(var i=0;i<pats.length;i++){
    var re=new RegExp("\\b"+pats[i].replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"\\b","i");
    if(re.test(en))return true;
  }

  return false;
}
function makeBlank(ex,word){
  if(!ex)return"（例文なし）";

  var en=String(ex).split(/[（(]/)[0].replace(/^\s+|\s+$/g,"")||String(ex);
  var safe=String(word||"").toLowerCase().replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
  var stem=String(word||"").replace(/e$/i,"").toLowerCase().replace(/[.*+?^${}()|[\]\\]/g,"\\$&");

  var pats=[safe,safe+"s",safe+"es",safe+"ed",safe+"ing",stem+"ing"];

  if(/[^aeiou]y$/i.test(word)){
    var y=String(word).slice(0,-1).toLowerCase();
    pats.push(y+"ies");
    pats.push(y+"ied");
  }

  var re=new RegExp("\\b("+pats.join("|")+")\\b","ig");
  var b=en.replace(re,"_____");

  if(b===en){
    return "";
  }

  return b;
}
function getExampleJP(ex){
  if(!ex)return "";

  var m=String(ex).match(/[（(]([^）)]+)[）)]/);

  if(m&&m[1]){
    return m[1].replace(/^\s+|\s+$/g,"");
  }

  return "";
}
function distract(w,n){
  var out=[],used={};
  used[w.id]=1;

  var tries=0;
  while(out.length<n && tries<120){
    tries++;
    var x=WM[Math.floor(Math.random()*WM.length)];
    if(!x||used[x.id])continue;
    if(!pass(x))continue;
    used[x.id]=1;
    out.push(x);
  }

  return out;
}

function exDistract(w,n){
  var out=[],used={};
  used[w.id]=1;

  var tries=0;
  while(out.length<n && tries<200){
    tries++;
    var x=WM[Math.floor(Math.random()*WM.length)];
    if(!x||used[x.id])continue;
    if(!pass(x))continue;
    if(hasExampleWord(w.example,x.word))continue;
    if(sameMeaningGroup(w,x))continue;

    used[x.id]=1;
    out.push(x);
  }

  tries=0;
  while(out.length<n && tries<120){
    tries++;
    x=WM[Math.floor(Math.random()*WM.length)];
    if(!x||used[x.id])continue;
    if(!pass(x))continue;

    used[x.id]=1;
    out.push(x);
  }

  return out;
}

function sameMeaningGroup(a,b){
  var aw=(a.meanings||[]).join(" ");
  var bw=(b.meanings||[]).join(" ");

  var groups=[
    ["注ぐ","提供","出す","給仕","serve","pour"],
    ["作る","創造","生み出","create","make","produce"],
    ["表す","表現","伝える","express","communicate"],
    ["言う","述べる","話す","say","tell","speak"],
    ["見る","眺める","観察","see","look","watch","observe"],
    ["得る","受け取る","もらう","get","receive","obtain"],
    ["助ける","支援","help","support","assist"]
  ];

  for(var i=0;i<groups.length;i++){
    var ga=false,gb=false;
    for(var j=0;j<groups[i].length;j++){
      var k=groups[i][j].toLowerCase();
      if(aw.toLowerCase().indexOf(k)>=0||String(a.word||"").toLowerCase().indexOf(k)>=0)ga=true;
      if(bw.toLowerCase().indexOf(k)>=0||String(b.word||"").toLowerCase().indexOf(k)>=0)gb=true;
    }
    if(ga&&gb)return true;
  }

  return false;
}
function qtype(w,mode){
  var c=cat(w),p=lp(),x=p[w.id]||{},hard=(x.wrong||0)>0||(x.level||0)===0;
  var canEx=hasExampleWord(w.example,w.word);

  if(c==="active"){
    if(canEx&&Math.random()<(hard?0.55:0.4))return"ex4";
    return Math.random()<0.6?"je4":"ew4";
  }

  if(canEx&&hard&&Math.random()<0.35)return"ex4";
  return"ew4";
}

function retryType(t,w){
  var canEx=hasExampleWord(w.example,w.word);

  if(t==="ew4")return canEx?"ex4":"je4";
  if(t==="je4")return canEx?"ex4":"ew4";

  return"je4";
}

function ensureFourOptions(w,opts){
  var used={},out=[],i,x;

  for(i=0;i<opts.length;i++){
    x=opts[i];
    if(x&&!used[x.id]){
      used[x.id]=1;
      out.push(x);
    }
  }

  for(i=0;i<WM.length&&out.length<4;i++){
    x=WM[i];
    if(!x||used[x.id])continue;
    if(!pass(x))continue;
    used[x.id]=1;
    out.push(x);
  }

  for(i=0;i<WM.length&&out.length<4;i++){
    x=WM[i];
    if(!x||used[x.id])continue;
    used[x.id]=1;
    out.push(x);
  }

  return out.slice(0,4);
}
function findCorrectIndex(opts,id){

  return 0;
}

    h+='<div class="si">'+sm+'</div></div>';
    h+='<div class="ar">';
    if(ok)h+='<button class="subbtn" onclick="markWeak()">😐 あやふや</button>';
h+='<button type="button" class="nextbtn" onclick="this.disabled=true;this.textContent=\'読み込み中...\';nq()">'+(q.i>=q.queue.length-1?'結果を見る →':'次へ →')+'</button>';
    h+='</div>';
  }

  app.innerHTML=h;
}

function addRetry(q,w,u){
  var r=cloneWord(w);
  mergeInto(r,u);
  r.qtype=retryType(w.qtype,w);
  q.queue.splice(Math.min(q.i+2,q.queue.length),0,r);
}

function aq(i){
  var q=S.q;
  if(q.ans)return;
  var w=q.queue[q.i],ok=i===q.ci;
  var selectedOpt = q.opts && q.opts[i] ? q.opts[i] : null;
  var correctOpt = q.opts && q.opts[q.ci] ? q.opts[q.ci] : null;

  q.sel=i;
  q.ans=true;

  saveAnswerLog({
    wordId: w.id,
    word: w.word,
    quizType: w.qtype,
    selectedAnswer: getAnswerTextByType(w,selectedOpt),
    correctAnswer: getAnswerTextByType(w,correctOpt),
    isCorrect: ok,
    timestamp: now(),
    part: w.part || "",
    wordNum: w.num || ""
  });

  addTodayStudy();
  if(ok){q.ok++;S.combo++;}
  else{q.ng++;S.combo=0;}

  var u=calcNext(w,ok);
  mergeInto(q.queue[q.i],u);
  saveP(u);
  if(!ok)addRetry(q,w,u);
  render();
}

function markWeak(){
  var q=S.q,w=q.queue[q.i];
  var u={id:w.id,level:0,correct:w.correct||0,wrong:(w.wrong||0)+1,nextReview:now(),interval:0};
  saveP(u);
  mergeInto(w,u);
  alert("要復習に戻しました");
}

var MOVING_NEXT=false;

function nq(){
  if(MOVING_NEXT)return;
  MOVING_NEXT=true;

  var q=S.q;

  if(q.i>=q.queue.length-1){
    q.done=true;
    ustk();
  }else{
    q.i++;
    q.ans=false;
    q.sel=-1;
    q.opts=null;
    q.oi=-1;
    q.ci=-1;
  }

  render();

  setTimeout(function(){
    MOVING_NEXT=false;
  },200);
}

function rResult(){
  var q=S.q,pct=q.queue.length?Math.round(q.ok/q.queue.length*100):0;
  app.innerHTML=
    '<div class="rbox">'+
    '<div class="re">'+(pct>=80?'🎉':(pct>=60?'💪':'😤'))+'</div>'+
    '<div class="rt">'+(pct>=80?'素晴らしい！':(pct>=60?'いい調子！':'復習で強くなる！'))+'</div>'+
    '<div class="rs">'+q.ok+'/'+q.queue.length+' 正解（'+pct+'%）</div>'+
    '<div class="abtn"><button class="btn1" onclick="go(0)">ホームへ</button>'+
    (q.ng?'<button class="btn2" onclick="sq(1)">苦手を復習</button>':'')+
    '</div></div>';
}

function listPartMatch(w){
  if(S.listPart==="all")return true;

  var n=parseInt(w.num,10)||w.id;

  if(S.listPart==="active1")return n>=1&&n<=400;
  if(S.listPart==="active2")return n>=401&&n<=1000;
  if(S.listPart==="passive1")return n>=1001&&n<=1400;
  if(S.listPart==="passive2")return n>=1401&&n<=2000;

  return true;
}
function listPagerHTML(totalItems,totalPages,start,showCount,position){
  if(totalPages<=1)return "";

  var from = totalItems ? start + 1 : 0;
  var to = totalItems ? start + showCount : 0;

  var margin = position==="top"
    ? "margin-top:4px;margin-bottom:12px;"
    : "margin-top:14px;margin-bottom:8px;";

  var h = "";

  h+='<div class="cd" style="margin-bottom:6px;text-align:center;">';
  h+=from+'〜'+to+'件目 / '+totalItems+'語中　'+(S.listPage+1)+' / '+totalPages+'ページ';
  h+='</div>';

  h+='<div class="abtn" style="'+margin+'">';
  h+='<button class="btn2" onclick="listPrev()" '+(S.listPage<=0?'disabled style="opacity:.35;cursor:default"':'')+'>◀ 前へ</button>';
  h+='<div style="padding:10px 12px;color:#5a6080;font-size:.82rem;">'+(S.listPage+1)+' / '+totalPages+'</div>';
  h+='<button class="btn2" onclick="listNext()" '+(S.listPage>=totalPages-1?'disabled style="opacity:.35;cursor:default"':'')+'>次へ ▶</button>';
  h+='</div>';

  return h;
}
function analysisPartMatch(item){
  if(S.analysisPart==="all")return true;

  var n=parseInt(item.wordNum,10)||parseInt(item.wordId,10)||0;

  if(S.analysisPart==="active1")return n>=1&&n<=400;
  if(S.analysisPart==="active2")return n>=401&&n<=1000;
  if(S.analysisPart==="passive1")return n>=1001&&n<=1400;
  if(S.analysisPart==="passive2")return n>=1401&&n<=2000;

  return true;
}

function filterAnalysisItems(items){
  var out = [];

  if(!items)return out;

  for(var i=0;i<items.length;i++){
    if(analysisPartMatch(items[i])){
      out.push(items[i]);
    }
  }

  return out;
}

function setAnalysisPart(v){
  S.analysisPart = v;
  S.analysisPage = {remiss:0,streakWrong:0,sameWrong:0};
  render();
}

function analysisPrev(type){
  if(S.analysisPage[type]>0){
    S.analysisPage[type]--;
    render();
  }
}

function analysisNext(type){
  S.analysisPage[type]++;
  render();
}

    else if(type==="sameWrong"){

    h+='<button class="btn2" onclick="analysisNext(\''+type+'\')" '+(S.analysisPage[type]>=totalPages-1?'disabled style="opacity:.35;cursor:default"':'')+'>次へ ▶</button>';

function rList(){
  var p=lp(),f=[],qtxt=(S.ls||"").toLowerCase();

  for(var i=0;i<WM.length;i++){
    var w=WM[i],x=p[w.id]||{},s=gst(x.level||0,x.wrong||0,x.nextReview||null);

    if(S.lf&&s!==S.lf-1)continue;
    if(!listPartMatch(w))continue;

    var hay=(w.word+" "+(w.meanings?w.meanings.join(" "):"")+" "+(w.part||"")).toLowerCase();
    if(qtxt&&hay.indexOf(qtxt)<0)continue;

    f.push({w:w,s:s});
  }

var pageSize=100;
  var totalPages=Math.max(1,Math.ceil(f.length/pageSize));

  if(S.listPage>=totalPages)S.listPage=totalPages-1;
  if(S.listPage<0)S.listPage=0;

  var start=S.listPage*pageSize;
  var end=start+pageSize;

  var h='<div class="lbox">';

  h+='<div style="display:flex;gap:6px;width:100%;max-width:640px;margin-bottom:10px;">';
  h+='<input id="searchBox" class="sinput" style="margin-bottom:0;flex:1;" placeholder="検索..." value="'+esc(S.ls)+'" oninput="S.ls=this.value" onkeydown="if(event.key===\'Enter\'){sls(this.value)}">';
  h+='<button class="btn1" style="padding:10px 14px;white-space:nowrap;" onclick="sls(document.getElementById(\'searchBox\').value)">検索</button>';
  h+='</div>';

  h+='<div class="frow">';
  var lbl=["すべて","未出題","学習中","要復習","MASTER"];
  for(i=0;i<lbl.length;i++){
    h+='<button class="fbtn'+(S.lf===i?' on':'')+'" onclick="slf('+i+')">'+lbl[i]+'</button>';
  }
  h+='</div>';

  h+='<select class="sinput" style="margin-bottom:10px;" onchange="slp(this.value)">';

  h+='<option value="active1" '+(S.listPart==="active1"?'selected':'')+'>Active Part1（1〜400）</option>';
  h+='<option value="active2" '+(S.listPart==="active2"?'selected':'')+'>Active Part2（401〜1000）</option>';
  h+='<option value="passive1" '+(S.listPart==="passive1"?'selected':'')+'>Passive Part1（1001〜1400）</option>';

    h+=f.length+'語';
    h+='</div>';

function resetP(){sp({});render();}
function slf(f){
  var box=document.getElementById("searchBox");
  if(box)S.ls=box.value;
  S.lf=f;
  S.listPage=0;
  S.revealed={};
  render();
}
function sls(v){
  S.ls=v;
  S.listPage=0;
  S.revealed={};
  render();
}
function slp(v){
  var box=document.getElementById("searchBox");
  if(box)S.ls=box.value;
  S.listPart=v;
  S.listPage=0;
  S.revealed={};
  render();
}
function scrollListTop(){
  setTimeout(function(){
    var target = document.querySelector(".lbox");
    var y = 0;

    if(target){
      y = target.getBoundingClientRect().top + window.pageYOffset - 8;
    }

    var scroller = document.scrollingElement || document.documentElement || document.body;

    try{
      scroller.scrollTop = Math.max(y,0);
      window.scrollTo(0, Math.max(y,0));
    }catch(e){
      window.scrollTo(0,0);
    }
  }, 80);
}
function listPrev(){
  if(S.listPage>0){
    S.listPage--;
    S.revealed={};
    render();
    scrollListTop();
  }
}

function listNext(){
  S.listPage++;
  S.revealed={};
  render();
  scrollListTop();
}

function toggleHideMeaning(){
  S.hideMeaning=!S.hideMeaning;
  S.revealed={};
  render();
}

function toggleReveal(id){
  if(!S.hideMeaning)return;
  S.revealed[id]=!S.revealed[id];
  render();
}

function speak(t){
  try{
    if(!window.speechSynthesis)return;
    var u=new SpeechSynthesisUtterance(t);
    u.lang="en-US";
    u.rate=1;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  }catch(e){}
}

function resetStudyLog(){
  if(!confirm("学習ログをリセットしますか？\n単語データ・出題範囲・連続学習日数は残ります。")){
    return;
  }

  // 単語ごとの学習進捗をリセット
  sp({});

  // 学習数をリセット
  localStorage.removeItem("studyDay");
  localStorage.removeItem("studyCount");
  localStorage.removeItem("studyTotal");
  localStorage.removeItem("answerLogs");

  // 画面上の状態もリセット
  S.combo = 0;
  S.q = {
    queue:[],
    i:0,
    ans:false,
    sel:-1,
    ok:0,
    ng:0,
    done:false,
    opts:null,
    oi:-1,
    ci:-1
  };

  alert("学習ログをリセットしました。\n単語データと出題範囲はそのままです。");
  render();
}
